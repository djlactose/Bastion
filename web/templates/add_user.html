{% extends "base.html" %}

{% block title %}Add User{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        Add User
    </div>
    <div class="card-body">
        <form method="POST" onsubmit="return validatePasswords()">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" name="username" id="username" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" name="password" id="password" placeholder="Password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
            </div>
            <div id="error-message" class="text-danger mb-3" style="display: none;">
                Passwords do not match!
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" name="is_admin" id="is_admin">
                <label class="form-check-label" for="is_admin">Admin</label>
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" name="force_password_change" id="force_password_change" checked>
                <label class="form-check-label" for="force_password_change">Require password change on next sign-in</label>
            </div>
            <button type="submit" class="btn btn-primary">Add User</button>
        </form>
        <a href="{{ url_for('list_users') }}" class="btn btn-secondary mt-2">Back to User List</a>
    </div>
</div>
{% endblock %}
