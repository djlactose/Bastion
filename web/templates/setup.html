{% extends "base.html" %}

{% block title %}Setup Admin{% endblock %}

{% block extra_head %}
<style>
    .setup-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 76px - 40px);
    }
    .setup-card {
        width: 100%;
        max-width: 480px;
    }
    .setup-icon {
        font-size: 3rem;
        color: var(--bs-primary);
    }
</style>
{% endblock %}

{% block content %}
<div class="setup-wrapper">
    <div class="setup-card">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock setup-icon"></i>
            <h4 class="mt-2">Bastion Config</h4>
            <p class="text-muted">Create the initial admin account to get started</p>
        </div>
        <div class="card">
            <div class="card-header">
                Setup Admin User
            </div>
            <div class="card-body">
                <form method="POST" onsubmit="return validatePasswords()">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" id="username" placeholder="Username" autocomplete="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" id="password" placeholder="Password" autocomplete="new-password" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" name="confirm_password" id="confirm_password" placeholder="Confirm Password" autocomplete="new-password" required>
                    </div>
                    <div id="error-message" class="text-danger mb-3" style="display: none;">
                        Passwords do not match!
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Create Admin</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
