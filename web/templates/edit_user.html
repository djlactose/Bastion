{% extends "base.html" %}

{% block title %}Edit User{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        Edit User
    </div>
    <div class="card-body">
        <form action="{{ url_for('edit_user', id=user.id) }}" method="POST" onsubmit="return validateEditPasswords()">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" name="username" id="username" value="{{ user.username }}" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" name="password" id="password" placeholder="Leave blank to keep current password">
                <div class="form-text">Leave blank to keep the current password.</div>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" name="confirm_password" id="confirm_password" placeholder="Confirm new password">
            </div>
            <div id="error-message" class="text-danger mb-3" style="display: none;">
                Passwords do not match!
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" name="is_admin" id="is_admin" {% if user.is_admin %}checked{% endif %}>
                <label class="form-check-label" for="is_admin">Admin</label>
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" name="force_password_change" id="force_password_change" {% if user.force_password_change %}checked{% endif %}>
                <label class="form-check-label" for="force_password_change">Require password change on next sign-in</label>
            </div>
            <button type="submit" class="btn btn-primary">Update User</button>
        </form>
        <a href="{{ url_for('list_users') }}" class="btn btn-secondary mt-2">Back to User List</a>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    function validateEditPasswords() {
        var password = document.getElementById("password").value;
        var confirmPassword = document.getElementById("confirm_password").value;
        // Only validate if a new password is being set
        if (password === '' && confirmPassword === '') return true;
        if (password !== confirmPassword) {
            document.getElementById("error-message").style.display = "block";
            return false;
        }
        document.getElementById("error-message").style.display = "none";
        return true;
    }
</script>
{% endblock %}
