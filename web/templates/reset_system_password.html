{% extends "base.html" %}

{% block title %}Reset Password - {{ username }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        Reset Password for System User: {{ username }}
    </div>
    <div class="card-body">
        <form method="POST" onsubmit="return validatePasswords()">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="mb-3">
                <label for="password" class="form-label">New Password</label>
                <input type="password" class="form-control" name="password" id="password" placeholder="New Password" required>
                <div class="form-text">Minimum 12 characters with uppercase, lowercase, digit, and special character.</div>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" name="confirm_password" id="confirm_password" placeholder="Confirm New Password" required>
            </div>
            <div id="error-message" class="text-danger mb-3" style="display: none;">
                Passwords do not match!
            </div>
            <button type="submit" class="btn btn-warning">Reset Password</button>
        </form>
        <a href="{{ url_for('list_system_users') }}" class="btn btn-secondary mt-2">Cancel</a>
    </div>
</div>
{% endblock %}
