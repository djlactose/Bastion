{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        Change Password
    </div>
    <div class="card-body">
        {% if forced %}
        <div class="alert alert-warning" role="alert">
            An administrator requires you to change your password before continuing.
        </div>
        {% endif %}
        <form method="POST" onsubmit="return validateNewPasswords()">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="mb-3">
                <label for="current_password" class="form-label">Current Password</label>
                <input type="password" class="form-control" name="current_password" id="current_password" placeholder="Enter current password" autocomplete="current-password" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">New Password</label>
                <input type="password" class="form-control" name="password" id="password" placeholder="Enter new password" autocomplete="new-password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" name="confirm_password" id="confirm_password" placeholder="Confirm new password" autocomplete="new-password" required>
            </div>
            <div id="error-message" class="text-danger mb-3" style="display: none;">
                Passwords do not match!
            </div>
            <button type="submit" class="btn btn-primary">Change Password</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    function validateNewPasswords() {
        var password = document.getElementById("password").value;
        var confirmPassword = document.getElementById("confirm_password").value;
        if (password !== confirmPassword) {
            document.getElementById("error-message").style.display = "block";
            return false;
        }
        document.getElementById("error-message").style.display = "none";
        return true;
    }
</script>
{% endblock %}
