name: Security scan (Trivy)

# Builds the image locally (no push) and scans it with Trivy. On pull requests
# this is a GATE: a dependency bump that still leaves a *fixable* HIGH/CRITICAL
# CVE fails the check, mirroring the manual `docker scout cves --only-fixed`
# loop. Also runs weekly and on demand for independent visibility. Findings are
# uploaded to the repo Security tab as SARIF.

on:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 07:00 UTC.
    - cron: "0 7 * * 1"

permissions: {}

jobs:
  scan:
    name: Build and scan image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image (load, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          no-cache: true
          tags: bastion:scan

      - name: Scan image with Trivy (gate on fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: bastion:scan
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif
          trivyignores: .trivyignore

      - name: Upload Trivy results to Security tab
        # Runs even when the scan gate fails, so findings are always visible.
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@f58f0d11ebf5dedd870fab2f999275f7602cfa46 # v2.26.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
