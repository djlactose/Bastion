name: Build and publish Bastion image

on:
  push:
    branches: [master, develop]
  workflow_dispatch:
  schedule:
    # Weekly rebuild (Monday 06:00 UTC) so OS-package CVEs are picked up via the
    # --no-cache `apt-get upgrade` even when no commit lands. Scheduled runs use
    # the default branch (master), refreshing :latest and :ubuntu.
    - cron: "0 6 * * 1"

permissions: {}

jobs:
  build-and-push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: djlactose/bastion
          # Branch routing:
          #   master  -> :latest, :ubuntu  (production rollouts pull these)
          #   develop -> :beta             (beta testers pull this)
          # Every build also publishes :sha-<commit> for digest-pinnable
          # rollbacks regardless of branch.
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=ubuntu,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=long

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max

      # Report-only scan of the just-published image. NON-gating on purpose: a
      # scheduled/master rebuild's job is to reduce CVEs, so it must publish the
      # improved image even if some fixable CVE remains. The hard gate lives in
      # the PR workflow (security-scan.yml), before merge. Findings land in the
      # Security tab.
      - name: Scan published image with Trivy (report only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: djlactose/bastion@${{ steps.build.outputs.digest }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-results.sarif
          trivyignores: .trivyignore

      - name: Upload Trivy results to Security tab
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@f58f0d11ebf5dedd870fab2f999275f7602cfa46 # v2.26.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-published
