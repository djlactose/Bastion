name: Build and publish Bastion image

on:
  push:
    branches: [master, develop]
  workflow_dispatch:
  schedule:
    # Weekly rebuild (Monday 06:00 UTC) so OS-package CVEs are picked up via the
    # --no-cache `apt-get upgrade` even when no commit lands. Scheduled runs use
    # the default branch (master), refreshing :latest and :ubuntu.
    - cron: "0 6 * * 1"

permissions: {}

jobs:
  build-and-push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: djlactose/bastion
          # Branch routing:
          #   master  -> :latest, :ubuntu  (production rollouts pull these)
          #   develop -> :beta             (beta testers pull this)
          # Every build also publishes :sha-<commit> for digest-pinnable
          # rollbacks regardless of branch.
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=ubuntu,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=long

      - name: Build and push image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max

      # Report-only scan of the just-published image. NON-gating on purpose: a
      # scheduled/master rebuild's job is to reduce CVEs, so it must publish the
      # improved image even if some fixable CVE remains. The hard gate lives in
      # the PR workflow (security-scan.yml), before merge. Findings land in the
      # Security tab.
      - name: Scan published image with Trivy (report only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: djlactose/bastion@${{ steps.build.outputs.digest }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-results.sarif
          trivyignores: .trivyignore

      - name: Upload Trivy results to Security tab
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@f58f0d11ebf5dedd870fab2f999275f7602cfa46 # v2.26.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-published
